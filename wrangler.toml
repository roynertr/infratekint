# Cloudflare Pages / Workers — build with: npm run build
# Dashboard: set build command "npm run build", output directory "dist"
# Note: do not set account_id here — Pages rejects it for `wrangler pages deploy`; CI passes account via wrangler-action.
name = "infratekint"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"
