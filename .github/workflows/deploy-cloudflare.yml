# Build + deploy to Cloudflare Pages on each push to master/main.
# Requires repository secret: CLOUDFLARE_API_TOKEN (Cloudflare API token with Account → Cloudflare Pages → Edit).
# account_id is read from wrangler.toml.
#
# If you also connect this repo in the Cloudflare dashboard (Git integration), disable one flow to avoid double deploys.

name: Deploy Cloudflare Pages

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=infratekint
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment URL
        if: github.event_name != 'pull_request' && steps.deploy.outputs.deployment-url != ''
        run: echo "Deployed to ${{ steps.deploy.outputs.deployment-url }}"
